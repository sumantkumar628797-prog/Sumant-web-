# netlify.toml - Production build & serverless configuration for Atelier Velox

[build]
  # Build command executed by Netlify CI
  command = "npm run build"
  # Directory containing static files to publish
  publish = "dist"
  # Directory where Netlify Serverless Functions can reside if needed
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--no-package-lock"

# SPA Fallback rule for React Router & Vite single page apps
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security and cache headers for high-end luxury performance (99+ PageSpeed)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
